<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NovaBank | Register</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="login-page">

<div class="login-container">

<div class="login-left">

<h1>Join NovaBank</h1>

<p>
Create your secure digital banking account.
</p>

<ul>

<li><i class="fa-solid fa-user-plus"></i> Easy Registration</li>

<li><i class="fa-solid fa-wallet"></i> Instant Account Creation</li>

<li><i class="fa-solid fa-lock"></i> Encrypted Passwords</li>

<li><i class="fa-solid fa-building-columns"></i> Modern Banking Experience</li>

</ul>

</div>


<div class="login-card">

<h2>Create Account</h2>

<p>Open your digital account in seconds</p>

<form id="registerForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="regEmail"
placeholder="Email Address"
required>

<input
type="password"
id="regPassword"
placeholder="Password"
required>

<button type="submit">

Create Account

</button>

</form>

<p class="register-link">

Already have an account?

<a href="index.html">

Login

</a>

</p>

<div id="message"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
