<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBank | Login</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body class="login-page">

<div class="login-container">

<div class="login-left">

<h1>NovaBank</h1>

<p>
Modern Digital Banking Platform
</p>

<ul>

<li><i class="fa-solid fa-lock"></i> Secure Login</li>

<li><i class="fa-solid fa-money-bill-transfer"></i> Instant Transfers</li>

<li><i class="fa-solid fa-shield-halved"></i> JWT Authentication</li>

<li><i class="fa-solid fa-cloud"></i> Docker Powered</li>

</ul>

</div>


<div class="login-card">

<h2>Welcome Back</h2>

<p>Login to continue</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<p class="register-link">

Don't have an account?

<a href="register.html">

Create Account

</a>

</p>

<div id="message"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
